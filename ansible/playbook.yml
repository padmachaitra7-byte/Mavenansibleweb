- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5013/workspace/Mavenansibleweb/target/Mavenansibleweb.war"
        dest: "/opt/tomcat/webapps/Mavenansibleweb.war"
        remote_src: no

    - name: Restart Tomcat
      shell:
        /opt/tomcat/bin/shutdown.sh || true
        sleep 5
        /opt/tomcat/bin/startup.sh
